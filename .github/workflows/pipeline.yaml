name: CI Pipeline

on: 
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs: 
  build: 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run linter
        run: |
          pip install flake8
          flake8 . --max-line-length=120

      - name: Run tests
        run: |
          pip install pytest
          pytest

